<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار برنامجي</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    text-align: center;
    margin-top: 50px;
}
button {
    padding: 15px 25px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    background-color: #4CAF50;
    color: white;
}
button:hover {
    background-color: #45a049;
}
</style>
</head>
<body>

<h1>مرحبا بك في اختبار برنامجي</h1>
<p>اضغط على الزر لتجربة الرسائل</p>

<button onclick="showMessage()">اختبر الرسالة</button>

<script>
function showMessage() {
    alert("تم اختبار البرنامج بنجاح! ✅");
}
</script>

</body>
</html>
