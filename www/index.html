<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابع صيانة السيارة</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: var(--primary-color); }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        input, select, button {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            cursor: pointer;
            background-color: var(--success-color);
            color: white;
            border: none;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; }

        .table-container { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th { background-color: var(--primary-color); color: white; }

        .total-box {
            margin-top: 20px;
            padding: 15px;
            background: #f1c40f;
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            border-radius: 8px;
        }

        .delete-btn { background-color: var(--danger-color); padding: 5px 10px; }
        
        /* ألوان الحالات مثل الصورة */
        .type-maintenance { color: #d35400; font-weight: bold; }
        .type-addition { color: #2980b9; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 سجل صيانة السيارة</h2>

    <div class="form-group">
        <input type="number" id="cost" placeholder="التكلفة">
        <input type="date" id="date">
        <input type="text" id="partNo" placeholder="رقم القطعة">
        <input type="number" id="quantity" placeholder="العدد">
        <input type="text" id="desc" placeholder="الوصف (مثلاً: زيت، فلاتر)">
        <input type="number" id="mileage" placeholder="الممشى">
        <select id="type">
            <option value="صيانة">صيانة</option>
            <option value="إضافة">إضافة</option>
        </select>
        <button onclick="addData()">إضافة للسجل</button>
    </div>

    <div class="table-container">
        <table id="maintTable">
            <thead>
                <tr>
                    <th>التكلفة</th>
                    <th>التاريخ</th>
                    <th>رقم القطعة</th>
                    <th>العدد</th>
                    <th>الوصف</th>
                    <th>الممشى</th>
                    <th>النوع</th>
                    <th>إجراء</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <div class="total-box" id="totalCost">
        إجمالي التكاليف: 0
    </div>
</div>

<script>
    let maintenanceData = JSON.parse(localStorage.getItem('carLog')) || [];

    function addData() {
        const entry = {
            id: Date.now(),
            cost: document.getElementById('cost').value || 0,
            date: document.getElementById('date').value || '-',
            partNo: document.getElementById('partNo').value || '-',
            quantity: document.getElementById('quantity').value || '-',
            desc: document.getElementById('desc').value || '-',
            mileage: document.getElementById('mileage').value || '-',
            type: document.getElementById('type').value
        };

        maintenanceData.push(entry);
        saveAndRender();
        clearInputs();
    }

    function deleteData(id) {
        maintenanceData = maintenanceData.filter(item => item.id !== id);
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('carLog', JSON.stringify(maintenanceData));
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        let total = 0;

        maintenanceData.forEach(item => {
            total += parseFloat(item.cost);
            const row = `
                <tr>
                    <td style="background-color: ${item.cost > 500 ? '#ffcccc' : '#e6fffa'}">${item.cost}</td>
                    <td>${item.date}</td>
                    <td>${item.partNo}</td>
                    <td>${item.quantity}</td>
                    <td>${item.desc}</td>
                    <td>${item.mileage}</td>
                    <td class="${item.type === 'صيانة' ? 'type-maintenance' : 'type-addition'}">${item.type}</td>
                    <td><button class="delete-btn" onclick="deleteData(${item.id})">حذف</button></td>
                </tr>
            `;
            tbody.innerHTML += row;
        });

        document.getElementById('totalCost').innerText = `إجمالي التكاليف: ${total}`;
    }

    function clearInputs() {
        document.querySelectorAll('input').forEach(input => input.value = '');
    }

    // عرض البيانات عند فتح التطبيق
    saveAndRender();
</script>

</body>
</html>
