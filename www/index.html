<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد الصيانة الذكي + OCR</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root { --p: #2c3e50; --s: #3498db; --g: #27ae60; --r: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { color: var(--p); border-right: 4px solid var(--s); padding-right: 10px; margin-top: 0; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none; }
        
        button { cursor: pointer; font-weight: bold; border: none; transition: 0.3s; }
        .btn-main { background: var(--g); color: white; width: 100%; }
        .btn-ai { background: #6c5ce7; color: white; }
        .btn-export { background: #2d3436; color: white; }

        #ocrStatus { font-size: 12px; color: var(--s); margin-top: 5px; }
        .reminder-item { background: #fff3cd; padding: 10px; border-radius: 8px; margin-bottom: 5px; border-right: 4px solid #ffc107; }
        .ai-box { background: #e1f5fe; padding: 15px; border-radius: 10px; border-right: 4px solid #03a9f4; line-height: 1.6; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border: 1px solid #eee; text-align: center; font-size: 13px; }
        th { background: var(--p); color: white; }
    </style>
</head>
<body>

    <div class="card">
        <h3>🤖 استخراج البيانات بالذكاء الاصطناعي</h3>
        <p style="font-size: 13px;">ارفع صورة الفاتورة لاستخراج التكلفة والنصوص تلقائياً:</p>
        <input type="file" id="imageInput" accept="image/*" onchange="processImage()">
        <div id="ocrStatus">جاهز لمعالجة الصور...</div>
    </div>

    <div class="card">
        <h3>➕ إضافة سجل صيانة</h3>
        <div class="grid">
            <input type="number" id="cost" placeholder="التكلفة">
            <input type="date" id="date">
            <input type="text" id="desc" placeholder="الوصف / القطعة">
            <input type="number" id="mileage" placeholder="الممشى الحالي">
            <select id="type">
                <option value="صيانة">صيانة</option>
                <option value="إضافة">إضافة</option>
            </select>
            <button class="btn-main" onclick="addData()">حفظ في الذاكرة</button>
        </div>
    </div>

    <div class="card">
        <h3>⏰ التذكيرات القادمة</h3>
        <div class="grid">
            <input type="text" id="remDesc" placeholder="تذكير بـ (مثلاً زيت)">
            <input type="number" id="remTarget" placeholder="عند ممشى (كم)">
            <button class="btn-ai" onclick="addReminder()">ضبط تذكير</button>
        </div>
        <div id="remindersList" style="margin-top:10px;"></div>
    </div>

    <div class="card">
        <button class="btn-export" onclick="exportToExcel()">📥 تصدير Excel</button>
        <button class="btn-export" onclick="document.getElementById('importFile').click()">📤 استيراد Excel</button>
        <input type="file" id="importFile" style="display:none" onchange="importFromExcel(event)">
        
        <div class="ai-box" style="margin-top:15px;">
            <strong>💡 تحليل الذكاء الاصطناعي:</strong>
            <div id="aiAnalysis">أدخل بياناتك للحصول على نصائح مخصصة لصيانة سيارتك.</div>
        </div>

        <div style="overflow-x:auto">
            <table>
                <thead>
                    <tr>
                        <th>التكلفة</th>
                        <th>التاريخ</th>
                        <th>الوصف</th>
                        <th>الممشى</th>
                        <th>حذف</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

<script>
    let maintenanceData = JSON.parse(localStorage.getItem('carLog')) || [];
    let reminders = JSON.parse(localStorage.getItem('carReminders')) || [];

    // --- 1. وظيفة معالجة الصور (OCR) ---
    async function processImage() {
        const file = document.getElementById('imageInput').files[0];
        const status = document.getElementById('ocrStatus');
        if (!file) return;

        status.innerText = "جاري القراءة... يرجى الانتظار (قد يستغرق ثواني)";
        
        try {
            const { data: { text } } = await Tesseract.recognize(file, 'eng+ara');
            status.innerText = "تمت القراءة بنجاح!";
            
            // محاولة استخراج الأرقام (كالتكلفة) من النص
            const numbers = text.match(/\d+(\.\d+)?/g);
            if (numbers) {
                // نفترض أن أكبر رقم قد يكون السعر
                const maxNum = Math.max(...numbers.map(Number));
                document.getElementById('cost').value = maxNum;
            }
            document.getElementById('desc').value = text.substring(0, 50) + "..."; // وضع جزء من النص في الوصف
            alert("تم استخراج بعض البيانات! يرجى مراجعتها وتصحيحها قبل الحفظ.");
        } catch (e) {
            status.innerText = "خطأ في قراءة الصورة.";
        }
    }

    // --- 2. وظائف البيانات والتذكيرات ---
    function addData() {
        const entry = {
            cost: document.getElementById('cost').value || 0,
            date: document.getElementById('date').value || new Date().toISOString().split('T')[0],
            desc: document.getElementById('desc').value || '-',
            mileage: parseInt(document.getElementById('mileage').value) || 0,
            type: document.getElementById('type').value
        };
        maintenanceData.push(entry);
        saveAll();
    }

    function addReminder() {
        reminders.push({
            desc: document.getElementById('remDesc').value,
            target: parseInt(document.getElementById('remTarget').value),
            done: false
        });
        saveAll();
    }

    function saveAll() {
        localStorage.setItem('carLog', JSON.stringify(maintenanceData));
        localStorage.setItem('carReminders', JSON.stringify(reminders));
        render();
    }

    // --- 3. محرك التحليل (الذكاء الاصطناعي المبسط) ---
    function runAIAnalysis() {
        const analysisDiv = document.getElementById('aiAnalysis');
        if (maintenanceData.length === 0) return;

        const lastMileage = Math.max(...maintenanceData.map(d => d.mileage));
        const totalSpent = maintenanceData.reduce((sum, item) => sum + parseFloat(item.cost), 0);

        let advice = `إجمالي ما تم صرفه: ${totalSpent} ريال. الممشى الحالي: ${lastMileage} كم. <br>`;
        
        // نصيحة ذكية بناءً على الممشى
        if (lastMileage > 80000) {
            advice += "⚠️ تنبيه: سيارتك تجاوزت 80 ألف كم، ننصح بفحص سير التيمن وفحص سوائل القير.";
        } else {
            advice += "✅ حالة السيارة جيدة بناءً على الممشى.";
        }

        // فحص التذكيرات
        reminders.forEach(r => {
            if (lastMileage >= r.target) {
                advice += `<br>🚨 <strong>تذكير عاجل:</strong> حان موعد ${r.desc} (المستهدف: ${r.target} كم).`;
            }
        });

        analysisDiv.innerHTML = advice;
    }

    // --- 4. التصدير والاستيراد ---
    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(maintenanceData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, "صيانة_السيارة.xlsx");
    }

    function importFromExcel(event) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
            maintenanceData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            saveAll();
        };
        reader.readAsArrayBuffer(event.target.files[0]);
    }

    function render() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        maintenanceData.sort((a,b) => b.mileage - a.mileage).forEach((item, i) => {
            tbody.innerHTML += `<tr><td>${item.cost}</td><td>${item.date}</td><td>${item.desc}</td><td>${item.mileage}</td><td><button onclick="deleteData(${i})" style="color:red">X</button></td></tr>`;
        });

        const rList = document.getElementById('remindersList');
        rList.innerHTML = '';
        reminders.forEach(r => {
            rList.innerHTML += `<div class="reminder-item">🔔 ${r.desc} عند ${r.target} كم</div>`;
        });
        
        runAIAnalysis();
    }

    function deleteData(i) { maintenanceData.splice(i, 1); saveAll(); }

    window.onload = render;
</script>
</body>
</html>
