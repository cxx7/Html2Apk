<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد الصيانة - الإصدار النهائي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --p: #1a252f; --s: #3498db; --g: #27ae60; --r: #e74c3c; --w: #f39c12; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        
        header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .sidebar { position: fixed; right: -320px; top: 0; width: 300px; height: 100%; background: #2c3e50; color: white; transition: 0.3s; z-index: 2000; padding: 20px; overflow-y: auto; }
        .sidebar.active { right: 0; }
        
        .menu-btn { width: 100%; background: #34495e; border: none; color: white; padding: 12px; text-align: right; margin-bottom: 5px; cursor: pointer; border-radius: 5px; }
        .menu-content { display: none; padding: 10px; background: #1a252f; border-radius: 5px; margin-bottom: 10px; }

        .card { background: white; border-radius: 12px; padding: 15px; margin: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-w { grid-column: span 2; }
        
        /* تنبيهات ملونة */
        .rem-card { padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .status-ok { background: #fff3cd; border-right: 5px solid var(--w); color: #856404; }
        .status-danger { background: #f8d7da; border-right: 5px solid var(--r); color: #721c24; font-weight: bold; border: 1px solid var(--r); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid #eee; text-align: center; font-size: 13px; }
        .btn-del { color: var(--r); cursor: pointer; background: none; border: none; font-size: 16px; }
    </style>
</head>
<body>

<header>
    <div onclick="toggleSidebar()" style="cursor:pointer; font-size:24px;">☰ القائمة</div>
    <select id="carSelector" onchange="switchCar(this.value)" style="padding:5px; border-radius:5px;"></select>
    <div onclick="addCar()" style="cursor:pointer; font-size:20px;">➕</div>
</header>

<div class="sidebar" id="sidebar">
    <button onclick="toggleSidebar()" style="background:var(--r); color:white; width:100%; border:none; padding:10px; margin-bottom:20px;">إغلاق ✖</button>
    
    <button class="menu-btn" onclick="toggleMenu('ocr-box')">📷 استخراج من صورة ▼</button>
    <div id="ocr-box" class="menu-content">
        <input type="file" id="ocrInput" onchange="runOCR()" style="width:100%;">
        <small id="ocrLoading" style="color:var(--s);"></small>
    </div>

    <button class="menu-btn" onclick="toggleMenu('rem-box')">⏰ ضبط تذكير جديد ▼</button>
    <div id="rem-box" class="menu-content">
        <input type="text" id="rName" placeholder="اسم الخدمة (زيت..)" style="width:90%; margin-bottom:5px;">
        <input type="number" id="rVal" placeholder="بعد كم كم؟" style="width:90%; margin-bottom:5px;">
        <button onclick="setRem()" style="width:95%; background:var(--g); border:none; color:white; padding:8px;">حفظ التذكير</button>
    </div>

    <button class="menu-btn" onclick="toggleMenu('xl-box')">📂 ملفات Excel ▼</button>
    <div id="xl-box" class="menu-content">
        <button onclick="downloadExcel()" style="width:100%; margin-bottom:5px;">📥 تصدير للجهاز</button>
    </div>
</div>

<div class="main-content">
    <div class="card">
        <h3>🚗 إضافة سجل: <span id="carLabel"></span></h3>
        <div class="input-grid">
            <input type="number" id="fCost" placeholder="التكلفة">
            <input type="date" id="fDate">
            <input type="text" id="fDesc" placeholder="الوصف" class="full-w">
            <input type="number" id="fKm" placeholder="الممشى المدخل" class="full-w">
            <button onclick="saveLog()" class="full-w" style="background:var(--g); color:white; font-weight:bold; border:none; padding:12px;">حفظ في الذاكرة</button>
        </div>
    </div>

    <div class="card">
        <div id="statsInfo" style="margin-bottom:15px; font-weight:bold; color:var(--p);"></div>
        <div id="remList"></div>
    </div>

    <div class="card" style="overflow-x:auto;">
        <table>
            <thead><tr><th>التكلفة</th><th>التاريخ</th><th>الممشى</th><th>الوصف</th><th>حذف</th></tr></thead>
            <tbody id="logTable"></tbody>
        </table>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('carAppData')) || {};
    let activeCar = localStorage.getItem('activeCarKey') || "";

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function toggleMenu(id) { 
        let m = document.getElementById(id); 
        m.style.display = m.style.display === 'block' ? 'none' : 'block'; 
    }

    function addCar() {
        let n = prompt("اسم السيارة:");
        if(n && !db[n]) {
            db[n] = { logs: [], rems: [], totalKm: 0, lastDate: "" };
            activeCar = n;
            save();
        }
    }

    function saveLog() {
        if(!activeCar) return;
        let car = db[activeCar];
        let cost = parseFloat(document.getElementById('fCost').value) || 0;
        let date = document.getElementById('fDate').value;
        let km = parseInt(document.getElementById('fKm').value) || 0;
        let desc = document.getElementById('fDesc').value;

        if(!date || !km) return alert("أدخل التاريخ والممشى");

        // --- المنطق الصحيح للممشى ---
        if (date === car.lastDate) {
            // تحديث نفس اليوم: نطرح القديم ونضيف الجديد
            let sameDayLogs = car.logs.filter(l => l.date === date);
            let oldKmInDay = sameDayLogs.length > 0 ? Math.max(...sameDayLogs.map(l => l.km)) : 0;
            car.totalKm = (car.totalKm - oldKmInDay) + km;
        } else {
            // يوم جديد: إضافة الممشى بالكامل للإجمالي
            car.totalKm += km;
        }

        car.lastDate = date;
        car.logs.push({ cost, date, km, desc });
        save();
        clear();
    }

    function setRem() {
        let name = document.getElementById('rName').value;
        let val = parseInt(document.getElementById('rVal').value);
        if(name && val) {
            db[activeCar].rems.push({ name, target: db[activeCar].totalKm + val, id: Date.now() });
            save();
            toggleSidebar();
        }
    }

    function removeRem(id) {
        db[activeCar].rems = db[activeCar].rems.filter(r => r.id !== id);
        save();
    }

    function save() {
        localStorage.setItem('carAppData', JSON.stringify(db));
        localStorage.setItem('activeCarKey', activeCar);
        render();
    }

    function render() {
        const sel = document.getElementById('carSelector');
        sel.innerHTML = Object.keys(db).map(k => `<option value="${k}" ${k===activeCar?'selected':''}>${k}</option>`).join('');
        
        if(!activeCar) return;
        document.getElementById('carLabel').innerText = activeCar;
        let car = db[activeCar];

        document.getElementById('statsInfo').innerHTML = `🚗 الممشى التراكمي: ${car.totalKm} كم | 💰 المصاريف: ${car.logs.reduce((s,l)=>s+l.cost,0)} ريال`;

        const rDiv = document.getElementById('remList');
        rDiv.innerHTML = car.rems.map(r => {
            let diff = r.target - car.totalKm;
            let isLate = diff <= 0;
            return `
                <div class="rem-card ${isLate ? 'status-danger' : 'status-ok'}">
                    <span>${isLate ? '🚨 يجب التوجه للصيانة: ' + r.name : '🔔 ' + r.name + ' (متبقي ' + diff + ' كم)'}</span>
                    <button onclick="removeRem(${r.id})" style="background:none; border:none; cursor:pointer;">✖</button>
                </div>
            `;
        }).join('');

        document.getElementById('logTable').innerHTML = car.logs.sort((a,b)=>new Date(b.date)-new Date(a.date)).map((l,i) => `
            <tr><td>${l.cost}</td><td>${l.date}</td><td>${l.km}</td><td>${l.desc}</td>
            <td><button class="btn-del" onclick="delLog(${i})">✖</button></td></tr>
        `).join('');
    }

    function switchCar(v) { activeCar = v; save(); }
    function delLog(i) { db[activeCar].logs.splice(i,1); save(); }
    function clear() {
        document.getElementById('fCost').value = '';
        document.getElementById('fDesc').value = '';
        document.getElementById('fKm').value = '';
    }

    async function runOCR() {
        const file = document.getElementById('ocrInput').files[0];
        document.getElementById('ocrLoading').innerText = "جاري القراءة...";
        const { data: { text } } = await Tesseract.recognize(file, 'eng+ara');
        const price = text.match(/\d+(\.\d+)?/g);
        if(price) document.getElementById('fCost').value = Math.max(...price.map(Number));
        document.getElementById('fDesc').value = text.substring(0,30);
        document.getElementById('ocrLoading').innerText = "تم المسح!";
    }

    function downloadExcel() {
        if(!activeCar) return;
        const data = db[activeCar].logs;
        const worksheet = XLSX.utils.json_to_sheet(data);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Logs");
        // تصدير حقيقي للجهاز
        XLSX.writeFile(workbook, `${activeCar}_Maintenance.xlsx`);
    }

    window.onload = () => {
        document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
        render();
    };
</script>
</body>
</html>
