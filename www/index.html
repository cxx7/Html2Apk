<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد صيانة السيارات الذكي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --warning: #f39c12; --danger: #e74c3c;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        
        .section { margin-bottom: 25px; padding: 15px; border: 1px solid #eee; border-radius: 10px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        
        input, select, button { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        button { cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #27ae60; color: white; }
        .btn-excel { background: #1f7244; color: white; margin: 5px; }
        .btn-alert { background: var(--warning); color: white; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; }
        th { background: var(--primary); color: white; }

        .reminder-card { background: #fff3cd; border-right: 5px solid #ffc107; padding: 10px; margin-top: 10px; border-radius: 5px; }
        .ai-note { background: #e1f5fe; border-right: 5px solid #03a9f4; padding: 10px; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚗 نظام إدارة الصيانة والتذكيرات</h2>

    <div class="section">
        <h3>➕ إضافة سجل جديد</h3>
        <div class="grid-inputs">
            <input type="number" id="cost" placeholder="التكلفة">
            <input type="date" id="date">
            <input type="text" id="desc" placeholder="الوصف (مثلاً: زيت محرك)">
            <input type="number" id="mileage" placeholder="الممشى الحالي">
            <select id="type">
                <option value="صيانة">صيانة</option>
                <option value="إضافة">إضافة</option>
            </select>
            <button class="btn-add" onclick="addData()">حفظ البيانات</button>
        </div>
    </div>

    <div class="section">
        <h3>⏰ ضبط تذكير مستقبلي</h3>
        <div class="grid-inputs">
            <input type="text" id="remDesc" placeholder="تذكير بـ...">
            <input type="number" id="remKm" placeholder="بعد كم كم؟ (مثلاً 5000)">
            <input type="date" id="remDate" placeholder="أو بتاريخ معين">
            <button class="btn-alert" onclick="addReminder()">ضبط التذكير</button>
        </div>
        <div id="remindersList"></div>
    </div>

    <div class="section">
        <button class="btn-excel" onclick="exportToExcel()">📥 تصدير إلى Excel</button>
        <input type="file" id="importFile" style="display:none" onchange="importFromExcel(event)">
        <button class="btn-excel" onclick="document.getElementById('importFile').click()">📤 استيراد من Excel</button>
        
        <div class="ai-note">
            <strong>🤖 ملاحظة ذكية:</strong> 
            <span id="aiAdvice">بناءً على بياناتك، يُفضل فحص ضغط الإطارات كل شهر.</span>
        </div>
    </div>

    <div style="overflow-x:auto">
        <table id="maintTable">
            <thead>
                <tr>
                    <th>التكلفة</th>
                    <th>التاريخ</th>
                    <th>الوصف</th>
                    <th>الممشى</th>
                    <th>النوع</th>
                    <th>حذف</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let maintenanceData = JSON.parse(localStorage.getItem('carLog')) || [];
    let reminders = JSON.parse(localStorage.getItem('carReminders')) || [];

    // --- وظائف البيانات ---
    function addData() {
        const entry = {
            cost: document.getElementById('cost').value || 0,
            date: document.getElementById('date').value || '-',
            desc: document.getElementById('desc').value || '-',
            mileage: document.getElementById('mileage').value || 0,
            type: document.getElementById('type').value
        };
        maintenanceData.push(entry);
        saveAll();
    }

    // --- وظائف التذكير ---
    function addReminder() {
        const rem = {
            desc: document.getElementById('remDesc').value,
            km: document.getElementById('remKm').value,
            date: document.getElementById('remDate').value,
            active: true
        };
        reminders.push(rem);
        saveAll();
    }

    function checkReminders() {
        const lastMileage = maintenanceData.length > 0 ? Math.max(...maintenanceData.map(d => d.mileage)) : 0;
        const list = document.getElementById('remindersList');
        list.innerHTML = '';
        
        reminders.forEach(r => {
            let msg = `تذكير: ${r.desc} - `;
            if(r.km) msg += `متبقي ${r.km - lastMileage} كم تقريباً.`;
            if(r.date) msg += ` موعده في ${r.date}.`;
            
            list.innerHTML += `<div class="reminder-card">${msg}</div>`;
        });
    }

    // --- وظائف EXCEL ---
    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(maintenanceData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Maintenance");
        XLSX.writeFile(wb, "Car_Maintenance_Log.xlsx");
    }

    function importFromExcel(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(firstSheet);
            maintenanceData = json;
            saveAll();
        };
        reader.readAsArrayBuffer(file);
    }

    // --- حفظ وعرض ---
    function saveAll() {
        localStorage.setItem('carLog', JSON.stringify(maintenanceData));
        localStorage.setItem('carReminders', JSON.stringify(reminders));
        renderTable();
        checkReminders();
        generateAIAdvice();
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        maintenanceData.forEach((item, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.cost}</td>
                    <td>${item.date}</td>
                    <td>${item.desc}</td>
                    <td>${item.mileage}</td>
                    <td>${item.type}</td>
                    <td><button onclick="deleteItem(${index})" style="background:red; color:white;">X</button></td>
                </tr>
            `;
        });
    }

    function deleteItem(index) {
        maintenanceData.splice(index, 1);
        saveAll();
    }

    // محاكاة بسيطة للذكاء الصناعي لإعطاء نصائح
    function generateAIAdvice() {
        if(maintenanceData.length > 5) {
            document.getElementById('aiAdvice').innerText = "نصيحة: يبدو أنك تستهلك الكثير على الزيوت، جرب نوعاً يدوم لـ 10,000 كم لتوفير التكاليف.";
        }
    }

    window.onload = saveAll;
</script>
</body>
</html>
